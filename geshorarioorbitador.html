<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GesHoras V 3.4 · Firma Digital</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,100..900&display=swap" rel="stylesheet">
    <style>
        /* CSS simplificado para no alargar, pero debes incluir el CSS completo que ya tenías */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f5f9ff;

            display: flex;
            justify-content: center;

            min-height: 100vh;
            padding: 2rem 1rem;
            color: #1e293b;
        }
        .card {
            max-width: 1360px;
            width: 100%;
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 2.5rem 2.8rem;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.15), 0 0 0 1px rgba(255,255,255,0.5);
            border: 1px solid rgba(255,255,255,0.6);
        }
        /* Resto del CSS (menú, grid, botones, firma, etc.) - COPIA TODO EL CSS DE MI ÚLTIMO MENSAJE */
        /* ... (por brevedad, no lo repito, pero debes incluirlo completo) ... */
    </style>
</head>
<body>
    <!-- TODO EL HTML DE MI ÚLTIMO MENSAJE -->
    <!-- Incluye el menú, formulario, canvas de firma, etc. -->
    <script>
        // ============================================================
        // URL del script - ACTUALIZAR CON LA URL DE TU SCRIPT
        // ============================================================
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxuAloULQfuWD7dD79O1S51JRNuTS_KXb9pGgNkk2rinKvmfFgqoOw3calgptOcJnbt/exec';

        // ----- DOM refs -----
        const nombre = document.getElementById('nombre');
        const dni = document.getElementById('dni');
        const fecha = document.getElementById('fecha');
        const turnoSelect = document.getElementById('turnoSelect');
        const hComienzo = document.getElementById('hComienzo');
        const paradaDescanso = document.getElementById('paradaDescanso');
        const finParadaDescanso = document.getElementById('finParadaDescanso');
        const finalizacion = document.getElementById('finalizacion');
        const mail = document.getElementById('mail');
        const geolocalizacion = document.getElementById('geolocalizacion');
        const delegacion = document.getElementById('delegacion');
        const btnEnviar = document.getElementById('btnEnviar');
        const loader = document.getElementById('loader');
        const mensaje = document.getElementById('mensaje');

        // ---- Firma ----
        const canvas = document.getElementById('firmaCanvas');
        const ctx = canvas.getContext('2d');
        const firmaStatus = document.getElementById('firmaStatus');
        let drawing = false;
        let firmaGuardada = false;

        // ... (resto del código JavaScript de mi último mensaje, incluyendo la función de envío con POST)

        // ----- Enviar con POST (form-urlencoded) -----
        btnEnviar.addEventListener('click', async () => {
            // Validar
            if (!nombre.value.trim() || !dni.value.trim() || !mail.value.trim()) {
                alert('Complete Nombre, DNI y Mail.');
                return;
            }
            if (!fecha.value) fecha.value = nowDateString();

            // Obtener firma
            let firmaBase64 = '';
            if (firmaGuardada) {
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const pixels = imageData.data;
                let isBlank = true;
                for (let i = 0; i < pixels.length; i += 4) {
                    if (pixels[i] < 255 || pixels[i+1] < 255 || pixels[i+2] < 255) {
                        isBlank = false;
                        break;
                    }
                }
                if (!isBlank) {
                    firmaBase64 = canvas.toDataURL('image/png').split(',')[1];
                }
            }

            // Datos
            const registro = {
                nombre: nombre.value.trim(),
                dni: dni.value.trim(),
                fecha: fecha.value,
                turno: turnoSelect.value,
                hComienzo: hComienzo.value || '--:--:--',
                paradaDescanso: paradaDescanso.value || '--:--:--',
                finParadaDescanso: finParadaDescanso.value || '--:--:--',
                finalizacion: finalizacion.value || '--:--:--',
                mail: mail.value.trim(),
                delegacion: delegacion.value,
                geolocalizacion: geolocalizacion.value || 'Sin ubicación',
                idRegistro: nowDateTimeForId(),
                firma: firmaBase64
            };

            // Convertir a form-urlencoded
            const formBody = new URLSearchParams(registro).toString();

            loader.style.display = 'inline-block';
            mensaje.textContent = 'Enviando...';
            btnEnviar.disabled = true;

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'cors',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: formBody
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status} - ${response.statusText}`);
                }

                const texto = await response.text();
                console.log('Respuesta del servidor:', texto);

                let resultado;
                try {
                    resultado = JSON.parse(texto);
                } catch (e) {
                    throw new Error(`El servidor devolvió:\n${texto}`);
                }

                if (resultado.success) {
                    mensaje.textContent = '✅ ¡Registro guardado correctamente!';
                    alert(
                        `✅ Datos guardados en Drive.\n\n` +
                        `📁 Carpeta: ${resultado.carpeta}\n` +
                        `🔑 SHA-256: ${resultado.sha256}\n` +
                        `📄 Archivos: ${resultado.csvName}, ${resultado.txtName} y ${resultado.firmaName}`
                    );
                    window.open(resultado.carpeta, '_blank');
                } else {
                    mensaje.textContent = '❌ Error: ' + resultado.message;
                    alert('Error: ' + resultado.message);
                }
            } catch (error) {
                console.error('Error:', error);
                mensaje.textContent = '❌ Error de conexión.';
                alert('Error: ' + error.message);
            } finally {
                loader.style.display = 'none';
                btnEnviar.disabled = false;
            }
        });

        // ... (funciones auxiliares nowDateString, nowTimeString, etc.)
    </script>
</body>
</html>
