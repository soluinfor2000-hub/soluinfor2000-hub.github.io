<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GesHoras</title>
</head>
<body>
    <h1>GesHoras</h1>
    <form id="form">
        <label>Nombre: <input type="text" id="nombre" required></label><br>
        <label>DNI: <input type="text" id="dni" required></label><br>
        <label>Fecha: <input type="text" id="fecha" readonly></label><br>
        <label>Turno:
            <select id="turno">
                <option value="MAÑANAS">MAÑANAS</option>
                <option value="TARDES">TARDES</option>
            </select>
        </label><br>
        <label>H. Comienzo: <input type="text" id="hComienzo" readonly></label><br>
        <label>Parada: <input type="text" id="parada" readonly></label><br>
        <label>Fin Parada: <input type="text" id="finParada" readonly></label><br>
        <label>H. Finalización: <input type="text" id="finalizacion" readonly></label><br>
        <label>Delegación:
            <select id="delegacion">
                <option value="Avila">Ávila</option>
                <option value="Segovia">Segovia</option>
            </select>
        </label><br>
        <label>Geolocalización: <textarea id="geolocalizacion" readonly></textarea></label><br>
        <button type="button" id="btnGeo">Grabar GEO</button><br>
        <label>Firma: <canvas id="firmaCanvas" width="300" height="100" style="border:1px solid #000;"></canvas></label><br>
        <button type="button" id="btnBorrarFirma">Borrar firma</button>
        <button type="button" id="btnGuardarFirma">Guardar firma</button><br>
        <button type="button" id="btnEnviar">Enviar</button>
        <div id="mensaje"></div>
    </form>

    <script>
        (function() {
            // URL del script (ACTUALIZAR CON LA URL DE APLICACIÓN WEB)
            const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwI8EuVCtoE-osXQCRtjQtIoGi-Fvdd3tippCHOUxdvMgWg2YrbSrHb3SjDu0vtyAsZ/exec';

            // Obtener referencias
            const nombre = document.getElementById('nombre');
            const dni = document.getElementById('dni');
            const fecha = document.getElementById('fecha');
            const turno = document.getElementById('turno');
            const hComienzo = document.getElementById('hComienzo');
            const parada = document.getElementById('parada');
            const finParada = document.getElementById('finParada');
            const finalizacion = document.getElementById('finalizacion');
            const delegacion = document.getElementById('delegacion');
            const geolocalizacion = document.getElementById('geolocalizacion');
            const btnGeo = document.getElementById('btnGeo');
            const btnEnviar = document.getElementById('btnEnviar');
            const mensaje = document.getElementById('mensaje');

            // Firma
            const canvas = document.getElementById('firmaCanvas');
            const ctx = canvas.getContext('2d');
            let dibujando = false;
            let firmaGuardada = false;
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.lineWidth = 2;
            ctx.lineCap = 'round';
            ctx.strokeStyle = '#000';

            function getPos(e) {
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                let clientX, clientY;
                if (e.touches) {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                    e.preventDefault();
                } else {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }
                return {
                    x: (clientX - rect.left) * scaleX,
                    y: (clientY - rect.top) * scaleY
                };
            }

            function iniciarDibujo(e) {
                e.preventDefault();
                dibujando = true;
                const pos = getPos(e);
                ctx.beginPath();
                ctx.moveTo(pos.x, pos.y);
                firmaGuardada = false;
            }

            function dibujar(e) {
                e.preventDefault();
                if (!dibujando) return;
                const pos = getPos(e);
                ctx.lineTo(pos.x, pos.y);
                ctx.stroke();
            }

            function finalizarDibujo(e) {
                e.preventDefault();
                dibujando = false;
            }

            canvas.addEventListener('mousedown', iniciarDibujo);
            canvas.addEventListener('mousemove', dibujar);
            canvas.addEventListener('mouseup', finalizarDibujo);
            canvas.addEventListener('mouseleave', finalizarDibujo);
            canvas.addEventListener('touchstart', iniciarDibujo, { passive: false });
            canvas.addEventListener('touchmove', dibujar, { passive: false });
            canvas.addEventListener('touchend', finalizarDibujo, { passive: false });

            document.getElementById('btnBorrarFirma').addEventListener('click', function() {
                ctx.fillStyle = 'white';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                firmaGuardada = false;
            });

            document.getElementById('btnGuardarFirma').addEventListener('click', function() {
                firmaGuardada = true;
            });

            // Fecha y horas
            function nowDateString() {
                const d = new Date();
                return String(d.getDate()).padStart(2,'0') + ':' + String(d.getMonth()+1).padStart(2,'0') + ':' + d.getFullYear();
            }
            function nowTimeString() {
                const d = new Date();
                return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0') + ':' + String(d.getSeconds()).padStart(2,'0');
            }
            function nowDateTimeForId() {
                const d = new Date();
                return String(d.getDate()).padStart(2,'0') + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + d.getFullYear() + ' - ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0') + ':' + String(d.getSeconds()).padStart(2,'0');
            }

            fecha.value = nowDateString();
            document.getElementById('btnFecha').addEventListener('click', function() { fecha.value = nowDateString(); });
            document.getElementById('btnComienzo').addEventListener('click', function() { hComienzo.value = nowTimeString(); });
            document.getElementById('btnParada').addEventListener('click', function() { parada.value = nowTimeString(); });
            document.getElementById('btnFinParada').addEventListener('click', function() { finParada.value = nowTimeString(); });
            document.getElementById('btnFinalizar').addEventListener('click', function() { finalizacion.value = nowTimeString(); });

            // Geolocalización
            btnGeo.addEventListener('click', function() {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        function(pos) {
                            geolocalizacion.value = 'https://www.google.com/maps?q=' + pos.coords.latitude + ',' + pos.coords.longitude;
                        },
                        function() {
                            geolocalizacion.value = 'https://maps.google.com/?q=40.3272,-3.7658';
                        }
                    );
                } else {
                    geolocalizacion.value = 'https://maps.google.com/?q=40.3272,-3.7658';
                }
            });

            // Enviar
            btnEnviar.addEventListener('click', async function() {
                if (!nombre.value.trim() || !dni.value.trim()) {
                    alert('Complete Nombre y DNI.');
                    return;
                }

                let firmaBase64 = '';
                if (firmaGuardada) {
                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const pixels = imageData.data;
                    let isBlank = true;
                    for (let i = 0; i < pixels.length; i += 4) {
                        if (pixels[i] < 255 || pixels[i+1] < 255 || pixels[i+2] < 255) {
                            isBlank = false;
                            break;
                        }
                    }
                    if (!isBlank) {
                        firmaBase64 = canvas.toDataURL('image/png').split(',')[1];
                    }
                }

                const registro = {
                    nombre: nombre.value.trim(),
                    dni: dni.value.trim(),
                    fecha: fecha.value,
                    turno: turno.value,
                    hComienzo: hComienzo.value || '--:--:--',
                    paradaDescanso: parada.value || '--:--:--',
                    finParadaDescanso: finParada.value || '--:--:--',
                    finalizacion: finalizacion.value || '--:--:--',
                    delegacion: delegacion.value,
                    geolocalizacion: geolocalizacion.value || 'Sin ubicación',
                    idRegistro: nowDateTimeForId(),
                    firma: firmaBase64
                };

                const formBody = new URLSearchParams(registro).toString();

                mensaje.textContent = 'Enviando...';

                try {
                    const response = await fetch(SCRIPT_URL, {
                        method: 'POST',
                        mode: 'cors',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: formBody
                    });

                    const texto = await response.text();
                    console.log('Respuesta:', texto);

                    let resultado;
                    try {
                        resultado = JSON.parse(texto);
                    } catch (e) {
                        alert('El servidor devolvió texto plano:\n' + texto);
                        mensaje.textContent = 'Error: respuesta no JSON.';
                        return;
                    }

                    if (resultado.success) {
                        mensaje.textContent = '✅ ¡Registro guardado!';
                        alert('Archivos creados en Drive.\nSHA-256: ' + resultado.sha256);
                        window.open(resultado.carpeta, '_blank');
                    } else {
                        mensaje.textContent = '❌ Error: ' + resultado.message;
                        alert('Error: ' + resultado.message);
                    }
                } catch (error) {
                    console.error(error);
                    mensaje.textContent = 'Error de conexión.';
                    alert('Error: ' + error.message);
                }
            });
        })();
    </script>
</body>
</html>
