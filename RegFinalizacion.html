<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GES-HORAS V.5.0</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,100..900&display=swap" rel="stylesheet">

    <style>
        /* ===== TU CSS ORIGINAL SIN TOCAR ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f5f9ff;
            font-family: "Inter", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem 1rem;
            color: #1e293b;
        }
        .card {
            max-width: 1360px;
            width: 100%;
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 2.5rem 2.8rem;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.15), 0 0 0 1px rgba(255,255,255,0.5);
            border: 1px solid rgba(255,255,255,0.6);
        }
        .menu-bar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 0.5rem;
            flex-wrap: nowrap;
        }
        .menu-dropdown { position: relative; display: inline-block; }
        .menu-dropdown > button {
            background: transparent;
            border: none;
            padding: 0.4rem 0.6rem;
            font-weight: 500;
            color: #1e293b;
            cursor: pointer;
            border-radius: 8px;
            transition: background 0.2s;
            font-size: 0.85rem;
            white-space: nowrap;
        }
        .menu-dropdown > button:hover { background: rgba(0,0,0,0.05); }
        .menu-dropdown .dropdown-content {
            display: none;
            position: absolute;
            right: 0;
            background: white;
            min-width: 200px;
            box-shadow: 0 12px 30px -10px rgba(0,0,0,0.2);
            border-radius: 16px;
            padding: 0.5rem 0;
            z-index: 10;
        }
        .menu-dropdown:hover .dropdown-content { display: block; }

        .dropdown-content a {
            display: block;
            padding: 0.5rem 1.2rem;
            color: #1e293b;
            text-decoration: none;
            font-size: 0.85rem;
        }
        .dropdown-content a:hover { background: #f1f5f9; }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.2rem 1.8rem;
            background: rgba(255,255,255,0.3);
            padding: 1.6rem 1.8rem;
            border-radius: 36px;
            margin-bottom: 1.8rem;
        }

        .campo label {
            font-size: 0.7rem;
            font-weight: 600;
            color: #64748b;
        }

        .campo input, .campo select {
            padding: 0.7rem 1.2rem;
            border-radius: 20px;
            border: 1px solid #e9edf4;
            width: 100%;
        }

        .btn {
            padding: 0.65rem 1.5rem;
            border-radius: 40px;
            border: none;
            cursor: pointer;
        }

        .btn-success {
            background: #0b3b2c;
            color: white;
        }

        .firma-canvas-wrapper {
            border: 2px dashed #b6c8f0;
            border-radius: 20px;
            overflow: hidden;
            max-width: 500px;
        }

        #firmaCanvas {
            width: 100%;
            height: auto;
            touch-action: none;
            background: white;
        }

        .loader {
            display: none;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #2563eb;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #mensaje {
            margin-left: 10px;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>

<div class="card">

    <!-- MENÚS (ORIGINAL) -->
    <div class="menu-bar">
        <div class="menu-dropdown">
            <button>Registros</button>
            <div class="dropdown-content">
                <a href="RegComienzo.html">Comienzo</a>
                <a href="RegParadaDescanso.html">Pausa</a>
                <a href="RegFinalizacion.html">Finalización</a>
            </div>
        </div>
    </div>

    <form id="formHorario">

        <div class="form-grid">

            <div class="campo">
                <label>Nombre</label>
                <input id="nombre" type="text">
            </div>

            <div class="campo">
                <label>DNI</label>
                <input id="dni" type="text">
            </div>

            <div class="campo">
                <label>Fecha</label>
                <input id="fecha" readonly>
            </div>

            <div class="campo">
                <label>Finalización</label>
                <input id="finalizacion" readonly>
                <button type="button" class="btn btn-outline" id="btnFinalizar">Tomar hora</button>
            </div>

            <div class="campo">
                <label>Delegación</label>
                <select id="delegacion">
                    <option>Avila</option>
                    <option>Segovia</option>
                </select>
            </div>

        </div>

        <!-- FIRMA (INTACTA) -->
        <div class="firma-canvas-wrapper">
            <canvas id="firmaCanvas" width="500" height="200"></canvas>
        </div>

        <div>
            <button type="button" class="btn" id="btnBorrarFirma">Borrar firma</button>
            <button type="button" class="btn" id="btnGuardarFirma">Guardar firma</button>
            <span id="firmaStatus">Sin firmar</span>
        </div>

        <!-- ENVIAR -->
        <div style="margin-top:15px;">
            <button type="button" class="btn btn-success" id="btnEnviar">Enviar registro</button>
            <div class="loader" id="loader"></div>
            <span id="mensaje"></span>
        </div>

    </form>
</div>

<!-- ===================================================== -->
<!-- SCRIPT CORREGIDO -->
<!-- ===================================================== -->

<script>
(function() {

    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwIJnjkCQiTODp2UgZKuiER2MNrkq17SGRs7a6XiEwbPMkBOArVFpKtIo1UKOjDfBS3/exec';

    const nombre = document.getElementById('nombre');
    const dni = document.getElementById('dni');
    const fecha = document.getElementById('fecha');
    const finalizacion = document.getElementById('finalizacion');
    const delegacion = document.getElementById('delegacion');
    const btnEnviar = document.getElementById('btnEnviar');
    const loader = document.getElementById('loader');
    const mensaje = document.getElementById('mensaje');

    const canvas = document.getElementById('firmaCanvas');
    const ctx = canvas.getContext('2d');

    const firmaStatus = document.getElementById('firmaStatus');

    let drawing = false;
    let firmaGuardada = false;

    function nowDate() {
        const d = new Date();
        return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getFullYear()).slice(-2)}`;
    }

    function nowTime() {
        const d = new Date();
        return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
    }

    fecha.value = nowDate();

    document.getElementById('btnFinalizar').addEventListener('click', () => {
        finalizacion.value = nowTime();
    });

    document.getElementById('btnBorrarFirma').addEventListener('click', () => {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        firmaGuardada = false;
        firmaStatus.textContent = "Sin firmar";
    });

    document.getElementById('btnGuardarFirma').addEventListener('click', () => {
        firmaGuardada = true;
        firmaStatus.textContent = "Firma guardada";
    });

    btnEnviar.addEventListener('click', async () => {

        const firmaBase64 = firmaGuardada
            ? canvas.toDataURL('image/png').split(',')[1]
            : '';

        const data = {
            nombre: nombre.value.trim(),
            dni: dni.value.trim(),
            fecha: fecha.value,
            finalizacion: finalizacion.value,
            delegacion: delegacion.value,
            firma: firmaBase64
        };

        const formBody = new URLSearchParams(data);

        loader.style.display = 'inline-block';
        mensaje.textContent = 'Enviando...';
        btnEnviar.disabled = true;

        try {

            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: formBody
            });

            const result = await response.json();

            if (result.success) {

                mensaje.textContent = "✔ Enviado correctamente";
                alert("✔ Registro enviado correctamente");

                finalizacion.value = '';
                ctx.clearRect(0,0,canvas.width,canvas.height);
                firmaGuardada = false;
                firmaStatus.textContent = "Sin firmar";

            } else {

                mensaje.textContent = "❌ Error al enviar";
                alert("❌ Error en el envío");
            }

        } catch (e) {

            mensaje.textContent = "❌ Error de conexión";
            alert("❌ Error de conexión");
        }

        loader.style.display = 'none';
        btnEnviar.disabled = false;
    });

})();
</script>

</body>
</html>
