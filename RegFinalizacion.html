<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GES-HORAS V.5.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,100..900&display=swap" rel="stylesheet">
    <!-- (Mismo CSS que RegComienzo con firma) -->
    <style>
        /* (Mismo CSS que RegComienzo) */
    </style>
</head>
<body>
<div class="card">
    <div class="menu-bar">
        <!-- (Menús iguales que RegComienzo) -->
    </div>
    <form id="formHorario">
        <div class="form-grid">
            <div class="campo">
                <label><i class="fas fa-user"></i> Nombre completo</label>
                <input type="text" id="nombre" placeholder="Ej. Ana García" required>
            </div>
            <div class="campo">
                <label><i class="fas fa-id-card"></i> DNI / NIE / CIF</label>
                <input type="text" id="dni" placeholder="12345678A" required>
            </div>
            <div class="campo">
                <label><i class="fas fa-calendar-day"></i> Fecha</label>
                <input type="text" id="fecha" readonly>
            </div>
            <div class="campo">
                <label><i class="fas fa-flag-checkered"></i> H. Finalización</label>
                <div style="display: flex; gap: 6px; align-items: center;">
                    <input type="text" id="finalizacion" readonly style="flex:1;">
                    <button type="button" class="btn btn-outline" id="btnFinalizar"><i class="fas fa-clock"></i> Tomar hora</button>
                </div>
            </div>
            <div class="campo">
                <label><i class="fas fa-building"></i> Delegación</label>
                <select id="delegacion">
                    <option value="Avila">Ávila</option>
                    <option value="Segovia">Segovia</option>
                </select>
            </div>
        </div>

        <!-- FIRMA (como en RegComienzo) -->
        <div class="firma-container">
            <label><i class="fas fa-pen-fancy"></i> Firma digital <span style="font-weight:400; color:#64748b; font-size:0.7rem;">(dibuja con el dedo o lápiz)</span></label>
            <div class="firma-canvas-wrapper">
                <canvas id="firmaCanvas" width="500" height="200"></canvas>
            </div>
            <div class="firma-botones">
                <button type="button" class="btn btn-outline" id="btnBorrarFirma"><i class="fas fa-eraser"></i> Borrar firma</button>
                <button type="button" class="btn btn-outline" id="btnGuardarFirma"><i class="fas fa-save"></i> Guardar firma</button>
                <span id="firmaStatus">Sin firmar</span>
            </div>
        </div>

        <div class="fila-acciones">
            <button type="button" class="btn btn-success" id="btnEnviar"><i class="fas fa-paper-plane"></i> Enviar registro</button>
            <div class="loader" id="loader"></div>
            <span id="mensaje"></span>
        </div>
    </form>
    <div class="footer-info">
        <div class="title">GESTIÓN DE HORARIO</div>
        <div class="credits">Desarrollada por Soluinfor 2000 - Fran informático © 2025</div>
    </div>
</div>
<script>
    // (mismo JavaScript que RegComienzo, con firma)
</script>
</body>
</html>
