<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GES-HORAS V.5.0</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,100..900&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f5f9ff;
            font-family: "Inter", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem 1rem;
            color: #1e293b;
        }
        .card {
            max-width: 1360px;
            width: 100%;
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 2.5rem 2.8rem;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.15);
            border: 1px solid rgba(255,255,255,0.6);
        }

        .menu-bar {
            display: flex;
            justify-content: flex-end;
            gap: 0.8rem;
            margin-bottom: 0.5rem;
        }

        .menu-dropdown { position: relative; }
        .menu-dropdown > button {
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 0.4rem 0.6rem;
        }

        .menu-dropdown .dropdown-content {
            display: none;
            position: absolute;
            right: 0;
            background: white;
            min-width: 200px;
            border-radius: 16px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.2);
            z-index: 10;
        }

        .menu-dropdown:hover .dropdown-content {
            display: block;
        }

        .dropdown-content a {
            display: block;
            padding: 0.5rem 1rem;
            text-decoration: none;
            color: #1e293b;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1rem;
            padding: 1.5rem;
            border-radius: 30px;
        }

        .campo label {
            font-size: 0.7rem;
            font-weight: 600;
        }

        .campo input, .campo select {
            padding: 0.7rem;
            border-radius: 15px;
            border: 1px solid #e5e7eb;
        }

        .btn {
            padding: 0.6rem 1.2rem;
            border-radius: 30px;
            border: none;
            cursor: pointer;
        }

        .btn-success {
            background: #0b3b2c;
            color: white;
        }

        .firma-canvas-wrapper {
            border: 2px dashed #b6c8f0;
            border-radius: 20px;
            background: white;
        }

        #firmaCanvas {
            width: 100%;
            height: 200px;
        }

        .loader {
            display: none;
        }
    </style>
</head>

<body>

<div class="card">

    <div class="menu-bar">
        <div class="menu-dropdown">
            <button>Registros</button>
            <div class="dropdown-content">
                <a href="RegComienzo.html">Comienzo</a>
                <a href="RegFinalizacion.html">Finalización</a>
            </div>
        </div>
    </div>

    <form id="formHorario">

        <div class="form-grid">

            <div class="campo">
                <label>Nombre</label>
                <input type="text" id="nombre">
            </div>

            <div class="campo">
                <label>DNI</label>
                <input type="text" id="dni">
            </div>

            <div class="campo">
                <label>Fecha</label>
                <input type="text" id="fecha" readonly>
            </div>

            <div class="campo">
                <label>Finalización</label>
                <input type="text" id="finalizacion" readonly>
                <button type="button" id="btnFinalizar" class="btn">Tomar hora</button>
            </div>

            <div class="campo">
                <label>Delegación</label>
                <select id="delegacion">
                    <option>Avila</option>
                    <option>Segovia</option>
                </select>
            </div>

        </div>

        <div class="firma-canvas-wrapper">
            <canvas id="firmaCanvas"></canvas>
        </div>

        <div>
            <button type="button" id="btnBorrarFirma" class="btn">Borrar</button>
            <button type="button" id="btnGuardarFirma" class="btn">Guardar</button>
        </div>

        <br>

        <button type="button" id="btnEnviar" class="btn btn-success">Enviar</button>
        <div class="loader" id="loader"></div>
        <span id="mensaje"></span>

    </form>

</div>

<script>
(function() {

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwIJnjkCQiTODp2UgZKuiER2MNrkq17SGRs7a6XiEwbPMkBOArVFpKtIo1UKOjDfBS3/exec";

const nombre = document.getElementById("nombre");
const dni = document.getElementById("dni");
const fecha = document.getElementById("fecha");
const finalizacion = document.getElementById("finalizacion");
const delegacion = document.getElementById("delegacion");
const btnEnviar = document.getElementById("btnEnviar");
const loader = document.getElementById("loader");
const mensaje = document.getElementById("mensaje");

const canvas = document.getElementById("firmaCanvas");
const ctx = canvas.getContext("2d");

let drawing = false;
let firmaOK = false;

function initCanvas() {
    canvas.width = 500;
    canvas.height = 200;
    ctx.fillStyle = "white";
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.strokeStyle = "#000";
    ctx.lineWidth = 2;
}
initCanvas();

function pos(e){
    const r = canvas.getBoundingClientRect();
    const x = (e.touches?e.touches[0].clientX:e.clientX)-r.left;
    const y = (e.touches?e.touches[0].clientY:e.clientY)-r.top;
    return {x:x*(canvas.width/r.width),y:y*(canvas.height/r.height)};
}

canvas.onmousedown = e=>{drawing=true;ctx.beginPath();ctx.moveTo(pos(e).x,pos(e).y);}
canvas.onmousemove = e=>{if(!drawing)return;ctx.lineTo(pos(e).x,pos(e).y);ctx.stroke();}
canvas.onmouseup = ()=>drawing=false;
canvas.ontouchstart = e=>{drawing=true;ctx.beginPath();ctx.moveTo(pos(e).x,pos(e).y);}
canvas.ontouchmove = e=>{if(!drawing)return;ctx.lineTo(pos(e).x,pos(e).y);ctx.stroke();}
canvas.ontouchend = ()=>drawing=false;

document.getElementById("btnBorrarFirma").onclick=()=>initCanvas();
document.getElementById("btnGuardarFirma").onclick=()=>firmaOK=true;

function nowDate(){
const d=new Date();
return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getFullYear()).slice(-2)}`;
}
function nowTime(){
const d=new Date();
return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
}

fecha.value = nowDate();

document.getElementById("btnFinalizar").onclick=()=>finalizacion.value=nowTime();

btnEnviar.onclick=async()=>{

loader.style.display="inline-block";
mensaje.textContent="Enviando...";

const data={
nombre:nombre.value,
dni:dni.value,
fecha:fecha.value,
finalizacion:finalizacion.value,
delegacion:delegacion.value,
firma:firmaOK?canvas.toDataURL("image/png").split(",")[1]:""
};

await fetch(SCRIPT_URL,{
method:"POST",
mode:"no-cors",
body:new URLSearchParams(data)
});

mensaje.textContent="Enviado correctamente";
loader.style.display="none";

};

})();
</script>

</body>
</html>
