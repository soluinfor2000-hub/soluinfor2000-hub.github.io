<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>RegFinalizacion</title>
    <!-- (Mismo CSS que RegParadaDescanso.html, omito por brevedad) -->
    <style>
        /* (Mismo CSS que en RegParadaDescanso.html) */
    </style>
</head>
<body>
<div class="card">
    <div class="menu-bar">
        <div class="menu-dropdown">
            <button><i class="fas fa-clipboard-list"></i> Registros <i class="fas fa-chevron-down" style="font-size:0.7rem; margin-left:6px;"></i></button>
            <div class="dropdown-content">
                <a href="RegComienzo.html"><i class="fas fa-play"></i> R. Comienzo</a>
                <a href="RegParadaDescanso.html"><i class="fas fa-pause"></i> R. Parada / Descanso</a>
                <a href="RegFinParadaDescanso.html"><i class="fas fa-check"></i> R. Fin Parada / Descanso</a>
                <a href="RegFinalizacion.html"><i class="fas fa-flag-checkered"></i> R. Finalización</a>
            </div>
        </div>
        <div class="menu-dropdown">
            <button><i class="fas fa-headset"></i> Soporte <i class="fas fa-chevron-down" style="font-size:0.7rem; margin-left:6px;"></i></button>
            <div class="dropdown-content">
                <a id="historico"><i class="fas fa-history"></i> Histórico de versiones</a>
                <a href="https://soluinfor2000.wixsite.com/soluinfor2000/pol%C3%ADca-de-privacidad" target="_blank"><i class="fas fa-shield-alt"></i> Aviso de Privacidad</a>
                <a href="https://forms.gle/e1CdTx2jiQ83xemG7" target="_blank"><i class="fas fa-edit"></i> Solicitud de modificación</a>
                <a href="https://api.whatsapp.com/send?phone=34629813855&text=Bienvenidos%20a%20Fran%20Inform%C3%A1tico%2C%20soporte%20inform%C3%A1tico%20a%20domicilio.%20%C2%BFEn%20que%20podemos%20ayudarle%3F" target="_blank"><i class="fas fa-envelope"></i> Contactar con Soporte</a>
            </div>
        </div>
    </div>

    <form id="formHorario">
        <div class="form-grid">
            <div class="campo">
                <label><i class="fas fa-user"></i> Nombre completo</label>
                <input type="text" id="nombre" placeholder="Ej. Ana García" required>
            </div>
            <div class="campo">
                <label><i class="fas fa-id-card"></i> DNI / NIE / CIF</label>
                <input type="text" id="dni" placeholder="12345678A" required>
            </div>
            <div class="campo">
                <label><i class="fas fa-calendar-day"></i> Fecha</label>
                <input type="text" id="fecha" readonly>
            </div>
            <div class="campo">
                <label><i class="fas fa-flag-checkered"></i> H. Finalización</label>
                <div style="display: flex; gap: 6px; align-items: center;">
                    <input type="text" id="finalizacion" readonly style="flex:1;">
                    <button type="button" class="btn btn-outline" id="btnFinalizar"><i class="fas fa-clock"></i> Tomar hora</button>
                </div>
            </div>
            <div class="campo">
                <label><i class="fas fa-building"></i> Delegación</label>
                <select id="delegacion">
                    <option value="Avila">Ávila</option>
                    <option value="Segovia">Segovia</option>
                </select>
            </div>
        </div>

        <div class="fila-acciones">
            <button type="button" class="btn btn-success" id="btnEnviar"><i class="fas fa-paper-plane"></i> Enviar registro</button>
            <div class="loader" id="loader"></div>
            <span id="mensaje"></span>
            <button type="button" class="btn btn-danger" id="btnCerrar" style="margin-left: auto;"><i class="fas fa-times"></i> Cerrar</button>
        </div>
    </form>

    <div class="footer-info">
        <div class="title">GESTIÓN DE HORARIO</div>
        <div class="logo">
            <img src="https://drive.google.com/uc?export=view&id=1HTsCHdETXanJTRZQ7Pf0vRn_YJrxZxP5" alt="Logo">
        </div>
        <div class="credits">Desarrollada por Soluinfor 2000 - Fran informático © 2025</div>
    </div>
</div>

<script>
    (function() {
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwynri4BazFpokf-N4kQ2SivhR9n4zINKqkY1ajBuu6B12pjEpVAyDRHfwY7f3ohTCIow/exec';

        const nombre = document.getElementById('nombre');
        const dni = document.getElementById('dni');
        const fecha = document.getElementById('fecha');
        const finalizacion = document.getElementById('finalizacion');
        const delegacion = document.getElementById('delegacion');
        const btnEnviar = document.getElementById('btnEnviar');
        const loader = document.getElementById('loader');
        const mensaje = document.getElementById('mensaje');

        document.getElementById('btnFinalizar').addEventListener('click', function() {
            finalizacion.value = nowTimeString();
        });

        document.getElementById('btnCerrar').addEventListener('click', function() {
            window.close();
        });

        document.getElementById('historico').addEventListener('click', function(e) {
            e.preventDefault();
            alert('Histórico de versiones:\n\nV 1.0 - Lanzamiento inicial\nV 2.0 - Mejoras en la interfaz\nV 3.0 - Integración con Google Sheets\nV 3.4 - Versión actual con múltiples registros');
        });

        function nowDateString() {
            const d = new Date();
            const dd = String(d.getDate()).padStart(2, '0');
            const mm = String(d.getMonth() + 1).padStart(2, '0');
            const yy = String(d.getFullYear()).slice(-2);
            return `${dd}/${mm}/${yy}`;
        }

        function nowTimeString() {
            const d = new Date();
            return `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}:${String(d.getSeconds()).padStart(2, '0')}`;
        }

        fecha.value = nowDateString();

        btnEnviar.addEventListener('click', async () => {
            if (!nombre.value.trim() || !dni.value.trim()) {
                alert('⚠️ Complete Nombre y DNI.');
                return;
            }
            if (finalizacion.value === '--:--:--' || finalizacion.value === '') {
                alert('⚠️ Pulse el botón "Tomar hora" para registrar la finalización.');
                return;
            }

            fecha.value = nowDateString();

            const registro = {
                tipo: 'finalizacion',
                nombre: nombre.value.trim(),
                dni: dni.value.trim(),
                fecha: fecha.value,
                finalizacion: finalizacion.value,
                delegacion: delegacion.value,
                hComienzo: '--:--:--',
                paradaDescanso: '--:--:--',
                finParadaDescanso: '--:--:--',
                geolocalizacion: '',
                firma: ''
            };

            const formBody = new URLSearchParams(registro).toString();

            loader.style.display = 'inline-block';
            mensaje.textContent = '⏳ Enviando...';
            btnEnviar.disabled = true;

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'cors',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formBody
                });

                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const texto = await response.text();
                console.log('📥 Respuesta:', texto);

                let resultado;
                try {
                    resultado = JSON.parse(texto);
                } catch (e) {
                    alert('El servidor devolvió texto plano:\n' + texto);
                    mensaje.textContent = '❌ El servidor devolvió texto plano.';
                    return;
                }

                if (resultado.success) {
                    mensaje.textContent = '✅ Registro enviado correctamente';
                    alert('✅ Hora de finalización registrada correctamente.');
                    finalizacion.value = '';
                } else {
                    mensaje.textContent = '❌ Error: ' + resultado.message;
                    alert('❌ Error: ' + resultado.message);
                }
            } catch (error) {
                console.error('❌ Error:', error);
                mensaje.textContent = '❌ Error de conexión.';
                alert('❌ Error: ' + error.message);
            } finally {
                loader.style.display = 'none';
                btnEnviar.disabled = false;
            }
        });

        setInterval(() => {
            fecha.value = nowDateString();
        }, 60000);
    })();
</script>
</body>
</html>
