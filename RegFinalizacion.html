<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GES-HORAS V.5.0</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,100..900&display=swap" rel="stylesheet">

    <!-- 🔵 TU CSS SIN CAMBIOS -->
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f5f9ff;
            font-family: "Inter", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem 1rem;
            color: #1e293b;
        }
        .card {
            max-width: 1360px;
            width: 100%;
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 2.5rem 2.8rem;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.15), 0 0 0 1px rgba(255,255,255,0.5);
        }
        .menu-bar { display:flex; justify-content:flex-end; gap:0.8rem; margin-bottom:0.5rem; }
        .menu-dropdown { position:relative; }
        .menu-dropdown > button {
            background: transparent;
            border: none;
            padding: 0.4rem 0.6rem;
            cursor: pointer;
        }
        .menu-dropdown .dropdown-content {
            display:none;
            position:absolute;
            right:0;
            background:white;
            min-width:200px;
            box-shadow:0 12px 30px -10px rgba(0,0,0,0.2);
            border-radius:16px;
            padding:0.5rem 0;
        }
        .menu-dropdown:hover .dropdown-content { display:block; }

        .form-grid {
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
            gap:1rem;
        }

        .campo label { font-size:0.7rem; font-weight:600; color:#64748b; }
        .campo input, .campo select {
            padding:0.7rem;
            border-radius:20px;
            border:1px solid #e9edf4;
        }

        .btn {
            padding:0.65rem 1.5rem;
            border-radius:40px;
            border:none;
            cursor:pointer;
        }

        .btn-success {
            background:#0b3b2c;
            color:white;
        }

        .firma-container {
            margin-top:1rem;
        }

        #firmaCanvas {
            border:2px dashed #b6c8f0;
            border-radius:20px;
            width:100%;
            max-width:500px;
        }

        .loader {
            display:none;
            border:3px solid #f3f3f3;
            border-top:3px solid #2563eb;
            border-radius:50%;
            width:20px;
            height:20px;
            animation:spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform:rotate(0deg); }
            100% { transform:rotate(360deg); }
        }
    </style>
</head>

<body>

<div class="card">

    <!-- MENÚS -->
    <div class="menu-bar">
        <div class="menu-dropdown">
            <button>Registros</button>
            <div class="dropdown-content">
                <a href="RegComienzo.html">Comienzo</a>
                <a href="RegParadaDescanso.html">Pausa</a>
                <a href="RegFinalizacion.html">Finalización</a>
            </div>
        </div>
    </div>

    <!-- FORM -->
    <form id="formHorario">

        <div class="form-grid">

            <div class="campo">
                <label>Nombre</label>
                <input id="nombre" type="text">
            </div>

            <div class="campo">
                <label>DNI</label>
                <input id="dni" type="text">
            </div>

            <div class="campo">
                <label>Fecha</label>
                <input id="fecha" readonly>
            </div>

            <div class="campo">
                <label>Finalización</label>
                <input id="finalizacion" readonly>
                <button type="button" class="btn" id="btnFinalizar">Tomar hora</button>
            </div>

            <div class="campo">
                <label>Delegación</label>
                <select id="delegacion">
                    <option>Avila</option>
                    <option>Segovia</option>
                </select>
            </div>

        </div>

        <!-- FIRMA -->
        <div class="firma-container">
            <canvas id="firmaCanvas" width="500" height="200"></canvas>

            <div>
                <button type="button" class="btn" id="btnBorrarFirma">Borrar</button>
                <button type="button" class="btn" id="btnGuardarFirma">Guardar</button>
                <span id="firmaStatus">Sin firmar</span>
            </div>
        </div>

        <!-- ENVIAR -->
        <div>
            <button type="button" class="btn btn-success" id="btnEnviar">
                Enviar
            </button>

            <div class="loader" id="loader"></div>
            <span id="mensaje"></span>
        </div>

    </form>

</div>

<!-- ========================================================= -->
<!-- 🔥 SCRIPT CORREGIDO COMPLETO -->
<!-- ========================================================= -->

<script>
(function() {

    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwIJnjkCQiTODp2UgZKuiER2MNrkq17SGRs7a6XiEwbPMkBOArVFpKtIo1UKOjDfBS3/exec';

    const nombre = document.getElementById('nombre');
    const dni = document.getElementById('dni');
    const fecha = document.getElementById('fecha');
    const finalizacion = document.getElementById('finalizacion');
    const delegacion = document.getElementById('delegacion');
    const btnEnviar = document.getElementById('btnEnviar');
    const loader = document.getElementById('loader');
    const mensaje = document.getElementById('mensaje');

    const canvas = document.getElementById('firmaCanvas');
    const ctx = canvas.getContext('2d');

    const firmaStatus = document.getElementById('firmaStatus');

    let drawing = false;
    let firmaGuardada = false;

    function nowDateString() {
        const d = new Date();
        return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getFullYear()).slice(-2)}`;
    }

    function nowTimeString() {
        const d = new Date();
        return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
    }

    fecha.value = nowDateString();

    document.getElementById('btnFinalizar').addEventListener('click', () => {
        finalizacion.value = nowTimeString();
    });

    document.getElementById('btnBorrarFirma').addEventListener('click', () => {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        firmaGuardada = false;
        firmaStatus.textContent = "Sin firmar";
    });

    document.getElementById('btnGuardarFirma').addEventListener('click', () => {
        firmaGuardada = true;
        firmaStatus.textContent = "Firma guardada";
    });

    btnEnviar.addEventListener('click', async () => {

        const firmaBase64 = firmaGuardada
            ? canvas.toDataURL('image/png').split(',')[1]
            : '';

        const data = {
            nombre: nombre.value.trim(),
            dni: dni.value.trim(),
            fecha: fecha.value,
            finalizacion: finalizacion.value,
            delegacion: delegacion.value,
            firma: firmaBase64
        };

        const formBody = new URLSearchParams(data);

        loader.style.display = 'inline-block';
        mensaje.textContent = 'Enviando...';
        btnEnviar.disabled = true;

        try {

            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: formBody
            });

            const result = await response.json();

            if (result.success) {
                mensaje.textContent = "✔ Enviado correctamente";
                alert("✔ Registro enviado correctamente");

                finalizacion.value = '';
                ctx.clearRect(0,0,canvas.width,canvas.height);
                firmaGuardada = false;
                firmaStatus.textContent = "Sin firmar";

            } else {
                mensaje.textContent = "❌ Error al enviar";
                alert("❌ Error en el envío");
            }

        } catch (e) {
            mensaje.textContent = "❌ Error de conexión";
            alert("❌ Error de conexión");
        }

        loader.style.display = 'none';
        btnEnviar.disabled = false;
    });

})();
</script>

</body>
</html>
