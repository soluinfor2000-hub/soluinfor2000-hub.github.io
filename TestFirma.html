<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Test Firma</title>
  <style>
    body { font-family: Arial; padding: 2rem; }
    canvas { border: 1px solid #000; touch-action: none; }
  </style>
</head>
<body>
  <h2>Prueba de firma - Diagnóstico</h2>
  <label>DNI: <input type="text" id="dni" value="12345678A"></label><br><br>
  <canvas id="firmaCanvas" width="500" height="200"></canvas><br>
  <button id="guardar">Guardar firma</button>
  <button id="enviar">Enviar</button>
  <p id="estado"></p>

  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxLTPe6ucifD3xLHjX0-FjPZ0iLmL3VyE-2V2QKs3TSZuSVSHdM_ES88ZnhlvJ6XvHb/exec'; // ⚠️ Poner la nueva URL

    const canvas = document.getElementById('firmaCanvas');
    const ctx = canvas.getContext('2d');
    let firmaGuardada = false;
    let drawing = false;

    ctx.fillStyle = 'white';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.strokeStyle = '#000';

    function getPos(e) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
    }

    canvas.addEventListener('mousedown', e => { drawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); });
    canvas.addEventListener('mousemove', e => { if (!drawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); });
    canvas.addEventListener('mouseup', () => drawing = false);
    canvas.addEventListener('touchstart', e => { e.preventDefault(); drawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); });
    canvas.addEventListener('touchmove', e => { e.preventDefault(); if (!drawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); });
    canvas.addEventListener('touchend', () => drawing = false);

    document.getElementById('guardar').addEventListener('click', () => {
      firmaGuardada = true;
      document.getElementById('estado').textContent = 'Firma guardada';
    });

    document.getElementById('enviar').addEventListener('click', async () => {
      if (!firmaGuardada) return alert('Guarda la firma primero');
      const dni = document.getElementById('dni').value.trim();
      if (!dni) return alert('Introduce DNI');

      const firmaBase64 = canvas.toDataURL('image/png').split(',')[1];
      const formBody = new URLSearchParams({ dni, firma: firmaBase64 }).toString();

      try {
        const res = await fetch(SCRIPT_URL, { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: formBody });
        const json = await res.json();
        if (json.success) {
          alert('Enviado. Revisa la hoja de cálculo en las columnas 16-18 para ver los valores reales.');
        } else {
          alert('Error: ' + json.message);
        }
      } catch (e) {
        alert('Error de conexión');
      }
    });
  </script>
</body>
</html>
