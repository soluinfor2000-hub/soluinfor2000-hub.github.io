<!DOCTYPE html>
<html lang="es">
<body>
  <h2>Test mínimo</h2>
  <label>DNI: <input type="text" id="dni" value="12345678A"></label><br><br>
  <canvas id="firmaCanvas" width="500" height="200" style="border:1px solid black"></canvas><br>
  <button onclick="enviar()">Enviar</button>
  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyc7wguivLik3n2fNpH5g-IRDiIMbEMAzfdL29nNCWA7KKfQVm6lE6Q2SDcz0Sz1W0T/exec'; // ← PONER LA NUEVA URL

    const canvas = document.getElementById('firmaCanvas');
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = 'white';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.strokeStyle = '#000';
    let drawing = false;
    canvas.addEventListener('mousedown', e => { drawing = true; ctx.beginPath(); ctx.moveTo(e.offsetX, e.offsetY); });
    canvas.addEventListener('mousemove', e => { if (drawing) { ctx.lineTo(e.offsetX, e.offsetY); ctx.stroke(); } });
    canvas.addEventListener('mouseup', () => drawing = false);
    canvas.addEventListener('touchstart', e => { e.preventDefault(); const t = e.touches[0]; const r = canvas.getBoundingClientRect(); drawing = true; ctx.beginPath(); ctx.moveTo(t.clientX - r.left, t.clientY - r.top); });
    canvas.addEventListener('touchmove', e => { e.preventDefault(); if (!drawing) return; const t = e.touches[0]; const r = canvas.getBoundingClientRect(); ctx.lineTo(t.clientX - r.left, t.clientY - r.top); ctx.stroke(); });
    canvas.addEventListener('touchend', () => drawing = false);

    async function enviar() {
      const dni = document.getElementById('dni').value.trim();
      if (!dni) return alert('Introduce DNI');
      const firmaBase64 = canvas.toDataURL('image/png').split(',')[1];
      const formBody = new URLSearchParams({ dni, firma: firmaBase64 }).toString();
      try {
        const res = await fetch(SCRIPT_URL, { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: formBody });
        const json = await res.json();
        if (json.success) {
          alert('Éxito. Revisa la hoja en la última fila, columna 13.');
        } else {
          alert('Error: ' + json.message);
        }
      } catch (e) {
        alert('Error de conexión');
      }
    }
  </script>
</body>
</html>
